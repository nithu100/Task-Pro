<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Task Pro v4.0 | Locked Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3b82f6; --bg: #020617; }
        body { background: var(--bg); color: white; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .btn-grad { background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); }
        
        /* 🔄 UPDATE OVERLAY STYLES */
        #update-overlay { position: fixed; inset: 0; z-index: 9999; bg: #020617; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s ease-in-out; }
        .hide-up { transform: translateY(-100%); opacity: 0; pointer-events: none; }
        
        /* 🛑 LOCK STYLES */
        .feature-locked { opacity: 0.2; pointer-events: none; filter: grayscale(1); }
        
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 5000; width: 90%; }
        .toast { background: rgba(15, 23, 42, 0.95); padding: 16px; border-radius: 20px; display: flex; align-items: center; gap: 10px; margin-bottom: 10px; animation: slideDown 0.4s; border: 1px solid rgba(255,255,255,0.1); }
        @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen relative">

    <div id="update-overlay" class="bg-[#020617]">
        <div class="relative mb-6">
            <div class="w-20 h-20 border-4 border-blue-500/20 border-t-blue-500 rounded-full animate-spin"></div>
            <i class="fas fa-robot absolute inset-0 flex items-center justify-center text-2xl text-blue-400"></i>
        </div>
        <h1 class="text-xl font-black italic text-white uppercase tracking-tighter">Task Pro Bot <span class="text-blue-500">v4.0</span></h1>
        <div class="w-48 h-1 bg-slate-800 rounded-full mt-4 overflow-hidden">
            <div id="p-bar" class="h-full bg-blue-500 w-0 transition-all duration-[2500ms]"></div>
        </div>
        <p class="text-[9px] font-bold text-slate-500 uppercase tracking-[4px] mt-4 animate-pulse">Updating Please Wait...</p>
    </div>

    <div id="toast-container"></div>

    <div class="bg-blue-600/10 border-b border-blue-500/20 p-2 text-center fixed top-0 w-full z-50">
        <p class="text-[9px] font-black text-blue-400 uppercase tracking-widest">Only Withdrawals Are Active</p>
    </div>

    <div id="main-app" class="px-6 pt-16">
        <div class="glass p-8 rounded-[2.5rem] bg-gradient-to-br from-blue-600/10 to-transparent mb-8 border-blue-500/20">
            <p class="text-slate-400 text-xs font-bold mb-1">Portfolio Balance</p>
            <h3 class="text-5xl font-black text-blue-400 italic">₹<span id="balance">0.00</span></h3>
            <button onclick="showWithdraw()" class="w-full btn-grad py-4 rounded-2xl font-black text-sm mt-8 shadow-lg shadow-blue-500/20">WITHDRAW NOW</button>
        </div>

        <div class="feature-locked">
            <h4 class="text-lg font-black mb-4">Missions</h4>
            <div class="space-y-3">
                <div class="glass p-4 rounded-2xl flex items-center gap-4"><div class="w-10 h-10 bg-slate-800 rounded-lg"></div><div class="h-4 w-24 bg-slate-800 rounded"></div></div>
                <div class="glass p-4 rounded-2xl flex items-center gap-4"><div class="w-10 h-10 bg-slate-800 rounded-lg"></div><div class="h-4 w-24 bg-slate-800 rounded"></div></div>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] glass rounded-3xl p-3 flex justify-around items-center z-[500]">
        <i class="fas fa-home text-blue-500 text-xl"></i>
        <i onclick="lockedError()" class="fas fa-tasks text-slate-700 text-xl"></i>
        <i onclick="lockedError()" class="fas fa-gift text-slate-700 text-xl"></i>
        <i onclick="lockedError()" class="fas fa-user-circle text-slate-700 text-xl"></i>
    </nav>

    <div id="modal" class="fixed inset-0 bg-[#020617]/95 backdrop-blur-xl z-[2000] hidden flex items-center justify-center p-6">
        <div class="glass w-full p-8 rounded-[2.5rem]" id="modal-content">
            <div id="modal-body"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, onValue, push, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyDx4Op4Z93ut30pIfnmSqW8EB4yrb772XA", authDomain: "tiger-8249f.firebaseapp.com", databaseURL: "https://tiger-8249f-default-rtdb.firebaseio.com", projectId: "tiger-8249f" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let userUID = null; let uBal = 0;

        // 🤖 Update Screen Logic
        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('p-bar').style.width = '100%';
            setTimeout(() => { document.getElementById('update-overlay').classList.add('hide-up'); }, 3000);
        });

        window.showToast = (msg) => {
            const c = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = 'toast';
            t.innerHTML = `<i class="fas fa-info-circle text-blue-400"></i><span class="text-xs font-bold">${msg}</span>`;
            c.appendChild(t);
            setTimeout(() => t.remove(), 2500);
        };

        window.lockedError = () => showToast("Feature locked during update!V4.0");

        onAuthStateChanged(auth, (user) => {
            if (user) { 
                userUID = user.uid;
                onValue(ref(db, `users/${user.uid}`), (s) => {
                    uBal = s.val()?.balance || 0;
                    document.getElementById('balance').innerText = uBal.toFixed(2);
                });
            } else { window.location.href = "login.html"; } // Redirect if no auth
        });

        window.showWithdraw = () => {
            document.getElementById('modal-body').innerHTML = `
                <h3 class="text-xl font-black mb-6 text-center">Withdraw Funds</h3>
                <input type="number" id="w-amt" placeholder="Amount (Min ₹50)" class="w-full bg-slate-900 p-4 rounded-2xl mb-4 outline-none border border-slate-800 text-blue-400 font-bold">
                <input type="text" id="w-upi" placeholder="UPI ID (e.g. name@bank)" class="w-full bg-slate-900 p-4 rounded-2xl mb-6 outline-none border border-slate-800">
                <button onclick="processW()" id="btnW" class="w-full btn-grad py-4 rounded-2xl font-black text-sm">SEND REQUEST</button>
                <button onclick="closeM()" class="w-full text-[10px] font-black uppercase text-slate-600 mt-4">Cancel</button>`;
            document.getElementById('modal').classList.remove('hidden');
        };

        window.processW = async () => {
            const amt = parseFloat(document.getElementById('w-amt').value);
            const upi = document.getElementById('w-upi').value.trim();
            if(amt < 50 || isNaN(amt)) return showToast("Min ₹50 required!");
            if(amt > uBal) return showToast("Balance kam hai!");
            if(!upi.includes('@')) return showToast("Invalid UPI ID!");

            document.getElementById('btnW').innerText = "Processing...";
            try {
                await update(ref(db, `users/${userUID}`), { balance: uBal - amt });
                await push(ref(db, 'withdraw'), { userId: userUID, amount: amt, upi: upi, status: 'pending', timestamp: Date.now() });
                showToast("Request Sent!"); closeM();
            } catch(e) { showToast("Error!"); }
        };

        window.closeM = () => document.getElementById('modal').classList.add('hidden');
    </script>
</body>
</html>
