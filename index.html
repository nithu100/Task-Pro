<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Task Pro Ultra | Professional Build</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #3b82f6;
            --secondary: #6366f1;
            --accent: #8b5cf6;
            --danger: #ef4444;
            --success: #22c55e;
            --bg-dark: #020617;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: var(--bg-dark);
            color: white;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* --- 🔥 ADVANCED ANIMATIONS --- */
        @keyframes slideDown {
            0% { transform: translateY(-100%) scale(0.9); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }

        @keyframes pulse-blue {
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(59, 130, 246, 0); }
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }

        .animate-shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        .animate-fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- PREMIUM UI COMPONENTS --- */
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 32px;
        }

        .btn-premium {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .btn-premium:active { transform: scale(0.96); opacity: 0.9; }

        /* --- TOAST NOTIFICATION --- */
        .toast-msg {
            position: fixed; top: 25px; left: 20px; right: 20px;
            z-index: 9999; padding: 18px 24px; border-radius: 20px;
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px);
            border-left: 5px solid var(--danger);
            display: flex; align-items: center; gap: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            animation: slideDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* --- MOBILE LAYOUT --- */
        .header-ui {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(15px);
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
        }

        .bottom-nav-ui {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            height: 75px; background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(25px); border-radius: 28px;
            display: flex; align-items: center; justify-content: space-around;
            border: 1px solid var(--border); z-index: 2000;
        }

        .nav-item { font-size: 1.4rem; color: #475569; transition: 0.3s; padding: 12px; }
        .nav-item.active { color: var(--primary); transform: translateY(-6px); }

        .modal-ui {
            position: fixed; inset: 0; background: var(--bg-dark);
            z-index: 5000; display: none; flex-direction: column;
        }

        /* Input Styling */
        .mobile-input-ui {
            width: 100%; background: #0f172a; border: 1px solid var(--border);
            border-radius: 20px; padding: 18px 22px; color: white;
            font-size: 16px; outline: none; transition: 0.3s;
        }
        .mobile-input-ui:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }

        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen">

    <div id="alert-root"></div>

    <section id="auth-module" class="fixed inset-0 z-[6000] bg-[#020617] p-8 flex flex-col justify-center">
        <div class="text-center mb-12 animate-fade-in">
            <h1 class="text-6xl font-black tracking-tighter italic text-transparent bg-clip-text bg-gradient-to-br from-blue-400 to-indigo-600">TASK PRO</h1>
            <p class="text-[10px] font-extrabold text-slate-500 tracking-[7px] mt-2 uppercase">Earn Money Mobile</p>
        </div>

        <div id="login-form-ui" class="space-y-5 animate-fade-in" style="animation-delay: 0.1s;">
            <div class="space-y-1">
                <label class="text-[10px] font-bold text-slate-500 uppercase ml-4">Credentials</label>
                <input type="email" id="auth-email" placeholder="Email Address" class="mobile-input-ui">
            </div>
            <input type="password" id="auth-pass" placeholder="Password" class="mobile-input-ui">
            <button onclick="processLogin()" class="w-full btn-premium py-5 rounded-2xl font-black uppercase text-sm tracking-widest text-white shadow-xl">Secure Login</button>
            <p class="text-center text-sm text-slate-500">Don't have account? <span onclick="toggleAuthUI(true)" class="text-blue-400 font-bold underline cursor-pointer">Register Now</span></p>
        </div>

        <div id="reg-form-ui" class="hidden space-y-4 animate-fade-in">
            <input type="text" id="reg-name" placeholder="Full Name" class="mobile-input-ui">
            <input type="email" id="reg-email" placeholder="Email" class="mobile-input-ui">
            <input type="password" id="reg-pass" placeholder="Password (6+ Characters)" class="mobile-input-ui">
            <input type="text" id="reg-refer" placeholder="Referral Code (Optional)" class="mobile-input-ui text-blue-400 text-center font-bold">
            <button onclick="processRegister()" class="w-full btn-premium py-5 rounded-2xl font-black uppercase tracking-widest text-white shadow-xl">Create Account</button>
            <p class="text-center text-sm text-slate-500">Already a member? <span onclick="toggleAuthUI(false)" class="text-blue-400 font-bold cursor-pointer">Login</span></p>
        </div>
    </section>

    <div id="app-interface" class="hidden">
        <header class="header-ui flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 bg-blue-600/10 rounded-2xl flex items-center justify-center text-blue-500 border border-blue-500/20"><i class="fas fa-crown"></i></div>
                <div><h2 id="display-user-name" class="font-black text-sm tracking-tight italic">Loading...</h2><p class="text-[9px] text-green-500 font-black uppercase tracking-wider">Verified User</p></div>
            </div>
            <button onclick="handleLogout()" class="w-10 h-10 rounded-xl bg-red-500/10 text-red-500 flex items-center justify-center"><i class="fas fa-power-off"></i></button>
        </header>

        <main class="px-6 pt-8 pb-40">
            <div id="main-wallet-card" class="glass-panel p-8 mb-10 border-blue-500/10 relative overflow-hidden animate-fade-in">
                <div class="absolute -top-10 -right-10 w-40 h-40 bg-blue-500/10 rounded-full blur-[50px]"></div>
                <p class="text-slate-500 text-[10px] font-black uppercase tracking-[3px] mb-2">Balance</p>
                <div class="flex items-baseline gap-2 mb-8">
                    <span class="text-2xl font-bold text-blue-500 italic">₹</span>
                    <h3 id="display-balance" class="text-6xl font-black tracking-tighter">0.00</h3>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="openRedeem()" class="bg-white text-black py-4.5 rounded-2xl font-black text-[11px] uppercase tracking-widest shadow-2xl">withdraw</button>
                    <button onclick="openHistory()" class="bg-white/5 py-4.5 rounded-2xl font-black text-[11px] uppercase tracking-widest border border-white/5">Transactions</button>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-3 mb-12 animate-fade-in" style="animation-delay: 0.1s;">
                <div onclick="window.open('https://youtube.com/shorts/L2kRF3FElTQ?si=x1Pgjo0_fj10aYPt')" class="glass-panel p-5 flex flex-col items-center gap-3 cursor-pointer border-white/5">
                    <div class="w-12 h-12 bg-blue-500/10 rounded-2xl flex items-center justify-center text-blue-400 text-xl"><i class="fas fa-globe-asia"></i></div>
                    <span class="text-[9px] font-black uppercase text-slate-500">proof screenshot URL</span>
                </div>
                <div onclick="openGuide()" class="glass-panel p-5 flex flex-col items-center gap-3 cursor-pointer border-white/5">
                    <div class="w-12 h-12 bg-indigo-500/10 rounded-2xl flex items-center justify-center text-indigo-400 text-xl"><i class="fas fa-play-circle"></i></div>
                    <span class="text-[9px] font-black uppercase text-slate-500">task complete Tutorial</span>
                </div>
                <div onclick="window.open('https://www.instagram.com/task_pro_247_support?igsh=bDV4enQycnFiZHlk')" class="glass-panel p-5 flex flex-col items-center gap-3 cursor-pointer border-white/5">
                    <div class="w-12 h-12 bg-green-500/10 rounded-2xl flex items-center justify-center text-green-400 text-xl"><i class="fab fa-telegram-plane"></i></div>
                    <span class="text-[9px] font-black uppercase text-slate-500">support 2pm to 6pm</span>
                </div>
            </div>

            <div class="flex items-center justify-between mb-6 px-2 animate-fade-in" style="animation-delay: 0.2s;">
                <h4 class="font-black text-xl italic tracking-tight">Daily Task ⚡</h4>
                <div class="h-[1px] flex-1 bg-slate-800 mx-4"></div>
                <span onclick="openTasks()" class="text-blue-500 text-[10px] font-black uppercase tracking-widest cursor-pointer">All Task</span>
            </div>

            <div id="task-feed-container" class="space-y-5 animate-fade-in" style="animation-delay: 0.3s;">
                <div class="h-24 bg-white/5 rounded-[30px] animate-pulse"></div>
                <div class="h-24 bg-white/5 rounded-[30px] animate-pulse"></div>
            </div>
        </main>

        <nav class="bottom-nav-ui">
            <div onclick="location.reload()" class="nav-item active"><i class="fas fa-th-large"></i></div>
            <div onclick="openTasks()" class="nav-item"><i class="fas fa-bolt-lightning"></i></div>
            <div onclick="openRefer()" class="nav-item"><i class="fas fa-user-group"></i></div>
            <div onclick="openProfile()" class="nav-item"><i class="fas fa-id-card-clip"></i></div>
        </nav>
    </div>

    <div id="modal-engine-ui" class="modal-ui">
        <header class="header-ui flex items-center">
            <div onclick="closeModalUI()" class="w-12 h-12 rounded-2xl bg-white/5 flex items-center justify-center text-blue-500 cursor-pointer border border-white/5"><i class="fas fa-arrow-left"></i></div>
            <h3 id="modal-ui-title" class="flex-1 text-center font-black text-lg tracking-tight">Mission Panel</h3>
            <div class="w-12"></div>
        </header>
        <div id="modal-ui-body" class="flex-1 overflow-y-auto px-6 py-10 pb-32"></div>
    </div>

    <script>
        // 1. DATABASE & AUTH CONFIGURATION
        const firebaseConfig = { 
            apiKey: "AIzaSyDx4Op4Z93ut30pIfnmSqW8EB4yrb772XA", 
            authDomain: "tiger-8249f.firebaseapp.com", 
            databaseURL: "https://tiger-8249f-default-rtdb.firebaseio.com", 
            projectId: "tiger-8249f" 
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let sessionUser = null;
        let sessionData = {};

        // 2. 🔥 TOAST NOTIFICATION ENGINE (THE SHAKE ALERT)
        function triggerAlert(message, type = "error") {
            const root = document.getElementById('alert-root');
            const toast = document.createElement('div');
            toast.className = 'toast-msg';
            if(type === "error") {
                toast.style.borderLeftColor = "#ef4444";
                toast.innerHTML = `<i class="fas fa-circle-exclamation text-red-500 text-xl"></i>
                                   <div><p class="text-[10px] font-black text-slate-500 uppercase">Alert System</p>
                                   <p class="text-white font-bold text-xs uppercase tracking-wider">${message}</p></div>`;
                
                // Trigger Shaking on Wallet Card
                const card = document.getElementById('main-wallet-card');
                if(card) {
                    card.classList.add('animate-shake');
                    setTimeout(() => card.classList.remove('animate-shake'), 600);
                }
            } else {
                toast.style.borderLeftColor = "#22c55e";
                toast.innerHTML = `<i class="fas fa-circle-check text-green-500 text-xl"></i>
                                   <div><p class="text-[10px] font-black text-slate-500 uppercase">Success</p>
                                   <p class="text-white font-bold text-xs uppercase tracking-wider">${message}</p></div>`;
            }

            root.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = "slideDown 0.4s reverse forwards";
                setTimeout(() => toast.remove(), 400);
            }, 3500);
        }

        // 3. UI STATE CONTROLLERS
        function toggleAuthUI(isReg) {
            document.getElementById('login-form-ui').classList.toggle('hidden', isReg);
            document.getElementById('reg-form-ui').classList.toggle('hidden', !isReg);
        }

        window.closeModalUI = () => document.getElementById('modal-engine-ui').style.display = 'none';
        window.openModalUI = (title) => {
            document.getElementById('modal-ui-title').innerText = title;
            document.getElementById('modal-engine-ui').style.display = 'flex';
            document.getElementById('modal-ui-body').scrollTop = 0;
        };

        // 4. AUTHENTICATION HANDLERS
        window.processLogin = function() {
            const e = document.getElementById('auth-email').value, p = document.getElementById('auth-pass').value;
            if(!e || !p) return triggerAlert("Fill all credentials!");
            auth.signInWithEmailAndPassword(e, p).catch(err => triggerAlert("Invalid user or password!"));
        }

        window.processRegister = function() {
            const n = document.getElementById('reg-name').value, e = document.getElementById('reg-email').value;
            const p = document.getElementById('reg-pass').value, r = document.getElementById('reg-refer').value;
            if(!n || !e || p.length < 6) return triggerAlert("Name/Email/Pass (6+) required!");

            auth.createUserWithEmailAndPassword(e, p).then(res => {
                const uid = res.user.uid;
                db.ref('users/' + uid).set({
                    userName: n, email: e, balance: 0,
                    referralCode: uid.slice(0,6).toUpperCase(),
                    referredBy: r || "NONE",
                    regDate: Date.now()
                });
            }).catch(err => triggerAlert("Email already exists!"));
        }

        window.handleLogout = () => auth.signOut();

        // 5. DATA SYNC & AUTH LISTENER
        auth.onAuthStateChanged(user => {
            if (user) {
                sessionUser = user;
                document.getElementById('auth-module').style.display = 'none';
                document.getElementById('app-interface').style.display = 'block';
                
                db.ref('users/' + user.uid).on('value', snap => {
                    sessionData = snap.val() || {};
                    document.getElementById('display-user-name').innerText = sessionData.userName || "Pro User";
                    document.getElementById('display-balance').innerText = (sessionData.balance || 0).toFixed(2);
                });
                renderTasks('task-feed-container', 10);
            } else {
                document.getElementById('auth-module').style.display = 'flex';
                document.getElementById('app-interface').style.display = 'none';
            }
        });

        // 6. MISSION LOGIC
        function renderTasks(targetId, limit) {
            db.ref('tasks').limitToFirst(limit).on('value', snap => {
                const container = document.getElementById(targetId);
                const tasks = snap.val(); if(!container || !tasks) return container.innerHTML = '<p class="text-center py-10 text-slate-600 font-bold uppercase text-[10px] tracking-widest">No Missions Available</p>';
                container.innerHTML = '';
                Object.keys(tasks).forEach(id => {
                    const t = tasks[id];
                    container.innerHTML += `
                        <div class="glass-panel p-6 flex items-center gap-5 border-white/5 animate-fade-in shadow-2xl">
                            <img src="${t.image}" class="w-14 h-14 rounded-2xl object-cover border border-white/10">
                            <div class="flex-1 min-w-0">
                                <h5 class="font-black text-[13px] truncate uppercase tracking-tight">${t.title}</h5>
                                <p class="text-blue-500 font-black text-sm italic">₹${t.reward}</p>
                            </div>
                            <button onclick="launchMission('${id}')" class="bg-blue-600/10 text-blue-500 px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest border border-blue-500/20 active:scale-90">Start</button>
                        </div>`;
                });
            });
        }

        window.launchMission = function(id) {
            db.ref('tasks/' + id).once('value', snap => {
                const t = snap.val();
                openModalUI("Task Briefing");
                document.getElementById('modal-ui-body').innerHTML = `
                    <div class="text-center space-y-8 animate-fade-in">
                        <div class="relative inline-block">
                            <img src="${t.image}" class="w-24 h-24 mx-auto rounded-[30px] object-cover shadow-2xl border-2 border-white/10">
                            <div class="absolute -bottom-2 -right-2 bg-blue-600 text-white w-8 h-8 rounded-full flex items-center justify-center text-xs font-black shadow-lg">₹</div>
                        </div>
                        <div><h3 class="text-2xl font-black tracking-tighter">${t.title}</h3><p class="text-slate-500 text-[11px] px-6 mt-3 font-semibold leading-relaxed">${t.desc}</p></div>
                        <div class="glass-panel p-8 border-blue-500/10 space-y-6">
                            <button onclick="window.open('${t.link}')" class="w-full btn-premium py-5 rounded-3xl font-black text-[11px] uppercase tracking-widest shadow-xl">1. Open Mission Link</button>
                            <div class="text-left space-y-2.5 px-2">
                                <label class="text-[9px] text-slate-500 font-black uppercase tracking-[2px] ml-3">2. Screenshot / Proof URL</label>
                                <input type="text" id="proof-input-box" placeholder="https://imgur.com/your-proof" class="mobile-input-ui text-xs font-mono">
                            </div>
                            <button onclick="commitProof('${id}')" class="w-full bg-slate-950 text-blue-500 py-5 rounded-3xl font-black text-[10px] uppercase border border-blue-500/10">Submit For Audit</button>
                        </div>
                    </div>`;
            });
        };

        window.commitProof = function(tid) {
            const proof = document.getElementById('proof-input-box').value.trim();
            if(!proof) return triggerAlert("Please provide proof URL!");
            db.ref('submissions').push({ 
                userId: sessionUser.uid, taskId: tid, proofImage: proof, 
                status: 'pending', date: Date.now() 
            });
            triggerAlert("Submission Received! Processing...", "success");
            closeModalUI();
        };

        // 7. PAYOUT & REFERRAL SYSTEM
        window.openRedeem = function() {
            openModalUI("Payout Terminal");
            document.getElementById('modal-ui-body').innerHTML = `
                <div class="space-y-8 text-center animate-fade-in">
                    <div class="glass-panel py-12 bg-blue-600/5 relative overflow-hidden">
                        <div class="absolute inset-0 bg-gradient-to-br from-blue-600/5 to-transparent"></div>
                        <p class="text-[10px] text-slate-500 font-black uppercase tracking-[3px] mb-2">Withdrawable Cash</p>
                        <h4 class="text-5xl font-black text-blue-500 tracking-tighter">₹${sessionData.balance.toFixed(2)}</h4>
                    </div>
                    <div class="space-y-4">
                        <div class="space-y-1 text-left">
                            <label class="text-[9px] font-black text-slate-500 uppercase ml-4">withdrawal Amount</label>
                            <input type="number" id="wd-amount" placeholder="MIN ₹50" class="mobile-input-ui text-center font-black">
                        </div>
                        <div class="space-y-1 text-left">
                            <label class="text-[9px] font-black text-slate-500 uppercase ml-4">UPI Address</label>
                            <input type="text" id="wd-upi" placeholder="enter your UPI ID" class="mobile-input-ui text-center uppercase font-bold text-blue-400">
                        </div>
                        <button onclick="executeWithdrawal()" class="w-full btn-premium py-5 rounded-3xl font-black uppercase text-sm shadow-2xl mt-4">withdrawal</button>
                    </div>
                    <p class="text-[9px] text-slate-600 font-bold uppercase tracking-widest px-10">Note: Transfers are processed within 24-48 hours after manual verification.</p>
                </div>`;
        };

        window.executeWithdrawal = function() {
            const amt = parseFloat(document.getElementById('wd-amount').value);
            const upi = document.getElementById('wd-upi').value.trim();
            
            // 🔥 ADVANCED ERROR VALIDATION WITH SHAKE
            if(!amt || isNaN(amt) || amt < 50) return triggerAlert("Minimum withdrawal is ₹50!");
            if(amt > sessionData.balance) return triggerAlert("Insufficient Wallet Funds!");
            if(!upi.includes('@')) return triggerAlert("Invalid UPI Address Format!");

            // Database Update
            db.ref('users/' + sessionUser.uid).update({ balance: sessionData.balance - amt });
            db.ref('withdraw').push({ 
                userId: sessionUser.uid, amount: amt, upi: upi, 
                status: 'pending', timestamp: Date.now() 
            });
            
            triggerAlert("Transfer Initiated Successfully!", "success");
            closeModalUI();
        };

        window.openHistory = () => {
            openModalUI("Transaction Logs");
            document.getElementById('modal-ui-body').innerHTML = `<div id="hist-list-ui" class="space-y-4"></div>`;
            db.ref('withdraw').orderByChild('userId').equalTo(sessionUser.uid).once('value', snap => {
                const list = document.getElementById('hist-list-ui');
                const data = snap.val(); if(!data) return list.innerHTML = '<p class="text-center text-slate-500 font-black mt-20 uppercase text-[10px] tracking-widest">No Records Found</p>';
                Object.keys(data).reverse().forEach(id => {
                    const item = data[id];
                    list.innerHTML += `
                        <div class="glass-panel p-6 flex justify-between items-center border-white/5">
                            <div>
                                <p class="font-black text-blue-500 text-lg">₹${item.amount}</p>
                                <p class="text-[9px] text-slate-500 font-bold uppercase">${new Date(item.timestamp).toLocaleDateString()}</p>
                            </div>
                            <div class="text-right">
                                <span class="px-3 py-1.5 rounded-lg text-[9px] font-black uppercase tracking-widest ${item.status==='paid'?'bg-green-500/10 text-green-500':'bg-orange-500/10 text-orange-500'}">${item.status}</span>
                            </div>
                        </div>`;
                });
            });
        };

        window.openRefer = () => {
            openModalUI("Refer & Earning");
            document.getElementById('modal-ui-body').innerHTML = `
                <div class="text-center py-6 space-y-10 animate-fade-in">
                    <div class="w-24 h-24 bg-blue-600/10 rounded-[35px] flex items-center justify-center mx-auto text-4xl text-blue-500 border border-blue-500/20 shadow-inner"><i class="fas fa-gift"></i></div>
                    <div class="px-4 space-y-3">
                        <h4 class="text-3xl font-black tracking-tighter italic">Get ₹3 Per Referral</h4>
                        <p class="text-[11px] text-slate-500 leading-relaxed font-semibold">Share your refer code with friends. When they sign up, you get ₹3 in your wallet instantly!</p>
                    </div>
                    <div class="glass-panel p-10 border-dashed border-2 border-slate-800 bg-white/[0.01]">

                        <div class="absolute bottom-1 right-1 bg-green-500 w-6 h-6 rounded-full border-4 border-slate-950"></div>
                    </div>
                    <div class="space-y-1">
                        <h3 class="text-4xl font-black tracking-tighter">${sessionData.userName}</h3>
                        <p class="text-slate-500 text-[10px] font-black uppercase tracking-[5px]">${sessionData.email}</p>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="glass-panel text-left p-6 border-white/5">
                            <p class="text-[9px] text-slate-600 font-black uppercase mb-1">Total Assets</p>
                            <h5 class="text-2xl font-black text-green-500">₹${sessionData.balance.toFixed(1)}</h5>
                        </div>
                        <div class="glass-panel text-left p-6 border-white/5">
                            <p class="text-[9px] text-slate-600 font-black uppercase mb-1">refer code</p>
                            <h5 class="text-xl font-black text-blue-500">${sessionData.referralCode}</h5>
                        </div>
                    </div>
                    <div class="pt-10">
                        <button onclick="handleLogout()" class="w-full bg-red-600/10 text-red-500 py-6 rounded-[2.5rem] font-black uppercase tracking-widest border border-red-600/10 text-[11px] active:bg-red-600/20">Sign Out </button>
                    </div>

        };

        window.openGuide = () => {
            openModalUI("App Tutorial");
            document.getElementById('modal-ui-body').innerHTML = `
                <div class="space-y-6 animate-fade-in">
                    <div class="glass-panel p-6 border-l-4 border-blue-600"><h5 class="font-black text-blue-500 text-xs uppercase mb-1">1. Pick a Mission</h5><p class="text-xs text-slate-500 font-semibold italic">Choose any task from the home screen and click 'Start'.</p></div>
                    <div class="glass-panel p-6 border-l-4 border-indigo-600"><h5 class="font-black text-indigo-500 text-xs uppercase mb-1">2. Complete & Screenshot</h5><p class="text-xs text-slate-500 font-semibold italic">Complete the task and copy the proof link or take a screenshot.</p></div>
                    <div class="glass-panel p-6 border-l-4 border-green-600"><h5 class="font-black text-green-500 text-xs uppercase mb-1">3. Get Paid</h5><p class="text-xs text-slate-500 font-semibold italic">Submit your proof and wait for our team to credit your wallet.</p></div>
                </div>`;
        };

        window.openTasks = () => { openModalUI("All Active Task"); renderTasks('modal-ui-body', 50); };
